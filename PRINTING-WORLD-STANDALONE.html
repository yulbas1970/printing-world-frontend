<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printing World ✓ FIXED</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            font-weight: 400;
            color-scheme: light dark;
            color: rgba(255, 255, 255, 0.87);
            background-color: #242424;
            font-synthesis: none;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
        }
        
        .standalone-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        
        .fixed-logo {
            color: transparent !important;
            background: linear-gradient(to right, #fbbf24, #f59e0b) !important;
            background-clip: text !important;
            -webkit-background-clip: text !important;
            font-weight: bold !important;
        }
        
        .fixed-badge {
            background: #4CAF50 !important;
            color: white !important;
            font-size: 12px !important;
            padding: 4px 8px !important;
            border-radius: 999px !important;
            font-weight: bold !important;
            margin-left: 8px !important;
        }
    </style>
</head>
<body>
    <div class="standalone-badge">🚀 STANDALONE VERSION</div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [language, setLanguage] = useState('en');
            const [currentSection, setCurrentSection] = useState('hero');

            // FORCE ENGLISH ALWAYS - NO EXCEPTIONS
            useEffect(() => {
                // Clear ALL possible language settings
                try {
                    localStorage.clear();
                    sessionStorage.clear();
                } catch (e) {}
                
                // Force English permanently
                setLanguage('en');
                
                // Set English flag
                try {
                    localStorage.setItem('FORCE_ENGLISH_ONLY', 'true');
                } catch (e) {}
                
                // Disable any auto-translation
                document.documentElement.setAttribute('translate', 'no');
                document.documentElement.setAttribute('lang', 'en');
            }, []);

            const translations = {
                en: {
                    nav: {
                        home: "Home",
                        about: "About",
                        services: "Services", 
                        contact: "Contact",
                        admin: "Admin"
                    },
                    hero: {
                        title: "Transform Your Spaces with Premium Wall Murals",
                        subtitle: "Professional printing services for restaurants, offices, and residential spaces",
                        cta: "Get Quote",
                        preview: "Preview Tool"
                    },
                    about: {
                        title: "Professional Mural Printing",
                        description: "We specialize in high-quality wall mural printing for commercial and residential spaces.",
                        experience: "5+ Years Experience",
                        projects: "200+ Projects",
                        satisfaction: "100% Satisfaction"
                    },
                    services: {
                        title: "Our Services",
                        residential: "Residential Murals",
                        commercial: "Commercial Spaces", 
                        restaurants: "Restaurant Design"
                    },
                    contact: {
                        title: "Contact Us",
                        phone: "Phone",
                        email: "Email",
                        address: "Address"
                    }
                },
                es: {
                    nav: {
                        home: "Inicio",
                        about: "Nosotros", 
                        services: "Servicios",
                        contact: "Contacto",
                        admin: "Admin"
                    },
                    hero: {
                        title: "Transforma Tus Espacios con Murales Premium",
                        subtitle: "Servicios profesionales de impresión para restaurantes, oficinas y espacios residenciales",
                        cta: "Cotizar",
                        preview: "Herramienta Preview"
                    },
                    about: {
                        title: "Impresión Profesional de Murales",
                        description: "Nos especializamos en impresión de murales de alta calidad para espacios comerciales y residenciales.",
                        experience: "5+ Años de Experiencia",
                        projects: "200+ Proyectos",
                        satisfaction: "100% Satisfacción"
                    },
                    services: {
                        title: "Nuestros Servicios",
                        residential: "Murales Residenciales",
                        commercial: "Espacios Comerciales",
                        restaurants: "Diseño de Restaurantes"
                    },
                    contact: {
                        title: "Contactanos",
                        phone: "Teléfono",
                        email: "Email", 
                        address: "Dirección"
                    }
                }
            };

            const t = (key) => {
                const keys = key.split('.');
                let value = translations[language];
                for (const k of keys) {
                    value = value?.[k];
                }
                return value || key;
            };

            const handleLanguageChange = (newLanguage) => {
                setLanguage(newLanguage);
                try {
                    localStorage.setItem('printingworld-language', newLanguage);
                } catch (e) {}
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900">
                    {/* Header */}
                    <header className="bg-black/90 backdrop-blur-sm sticky top-0 z-50 border-b border-gray-800">
                        <div className="container mx-auto px-4">
                            <div className="flex items-center justify-between h-16">
                                {/* Logo */}
                                <div className="flex items-center space-x-3">
                                    <div className="h-10 w-10 rounded-full bg-gradient-to-r from-yellow-400 to-orange-400 flex items-center justify-center">
                                        <span className="text-black font-bold text-lg">PW</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <h1 
                                            className="fixed-logo text-2xl font-bold"
                                            data-no-translate="true"
                                        >
                                            Printing World
                                        </h1>
                                        <span className="fixed-badge">✓ FIXED</span>
                                    </div>
                                </div>

                                {/* Desktop Navigation */}
                                <nav className="hidden md:flex items-center space-x-8">
                                    <a href="#home" className="text-gray-300 hover:text-yellow-400 transition-colors">{t('nav.home')}</a>
                                    <a href="#about" className="text-gray-300 hover:text-yellow-400 transition-colors">{t('nav.about')}</a>
                                    <a href="#services" className="text-gray-300 hover:text-yellow-400 transition-colors">{t('nav.services')}</a>
                                    <a href="#contact" className="text-gray-300 hover:text-yellow-400 transition-colors">{t('nav.contact')}</a>
                                    <button className="bg-gradient-to-r from-yellow-400 to-orange-400 text-black px-4 py-2 rounded-lg font-medium hover:shadow-lg transition-all">
                                        {t('nav.admin')}
                                    </button>
                                </nav>

                                {/* Language Selector */}
                                <div className="flex items-center space-x-4">
                                    <select 
                                        value={language}
                                        onChange={(e) => handleLanguageChange(e.target.value)}
                                        className="bg-gray-800 text-white border border-gray-600 rounded-lg px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400"
                                    >
                                        <option value="en">🇺🇸 English</option>
                                        <option value="es">🇪🇸 Español</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Hero Section */}
                    <section id="home" className="relative min-h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 bg-gradient-to-r from-black/50 to-black/30"></div>
                        <div className="relative z-10 text-center px-4 max-w-4xl mx-auto">
                            <h1 className="text-5xl md:text-7xl font-bold mb-6 bg-gradient-to-r from-yellow-400 via-orange-400 to-red-400 bg-clip-text text-transparent">
                                {t('hero.title')}
                            </h1>
                            <p className="text-xl md:text-2xl text-gray-300 mb-8 max-w-2xl mx-auto">
                                {t('hero.subtitle')}
                            </p>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                <button className="bg-gradient-to-r from-yellow-400 to-orange-400 text-black px-8 py-4 rounded-lg text-lg font-bold hover:shadow-2xl hover:scale-105 transition-all">
                                    {t('hero.cta')}
                                </button>
                                <button className="border-2 border-yellow-400 text-yellow-400 px-8 py-4 rounded-lg text-lg font-bold hover:bg-yellow-400 hover:text-black transition-all">
                                    {t('hero.preview')}
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* About Section */}
                    <section id="about" className="py-20 bg-gray-900/50">
                        <div className="container mx-auto px-4">
                            <div className="text-center mb-16">
                                <h2 className="text-4xl md:text-5xl font-bold mb-6 bg-gradient-to-r from-yellow-400 to-orange-400 bg-clip-text text-transparent">
                                    {t('about.title')}
                                </h2>
                                <p className="text-xl text-gray-300 max-w-3xl mx-auto">
                                    {t('about.description')}
                                </p>
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-8 max-w-4xl mx-auto">
                                <div className="text-center p-6 bg-gray-800/50 rounded-xl backdrop-blur-sm border border-gray-700">
                                    <div className="text-3xl font-bold text-yellow-400 mb-2">{t('about.experience')}</div>
                                </div>
                                <div className="text-center p-6 bg-gray-800/50 rounded-xl backdrop-blur-sm border border-gray-700">
                                    <div className="text-3xl font-bold text-yellow-400 mb-2">{t('about.projects')}</div>
                                </div>
                                <div className="text-center p-6 bg-gray-800/50 rounded-xl backdrop-blur-sm border border-gray-700">
                                    <div className="text-3xl font-bold text-yellow-400 mb-2">{t('about.satisfaction')}</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Services Section */}
                    <section id="services" className="py-20">
                        <div className="container mx-auto px-4">
                            <div className="text-center mb-16">
                                <h2 className="text-4xl md:text-5xl font-bold mb-6 bg-gradient-to-r from-yellow-400 to-orange-400 bg-clip-text text-transparent">
                                    {t('services.title')}
                                </h2>
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">
                                <div className="bg-gradient-to-br from-gray-800 to-gray-900 p-8 rounded-2xl border border-gray-700 hover:border-yellow-400 transition-all">
                                    <h3 className="text-2xl font-bold text-yellow-400 mb-4">{t('services.residential')}</h3>
                                    <p className="text-gray-300">Custom murals for homes and apartments</p>
                                </div>
                                <div className="bg-gradient-to-br from-gray-800 to-gray-900 p-8 rounded-2xl border border-gray-700 hover:border-yellow-400 transition-all">
                                    <h3 className="text-2xl font-bold text-yellow-400 mb-4">{t('services.commercial')}</h3>
                                    <p className="text-gray-300">Professional designs for offices and retail</p>
                                </div>
                                <div className="bg-gradient-to-br from-gray-800 to-gray-900 p-8 rounded-2xl border border-gray-700 hover:border-yellow-400 transition-all">
                                    <h3 className="text-2xl font-bold text-yellow-400 mb-4">{t('services.restaurants')}</h3>
                                    <p className="text-gray-300">Themed murals for dining experiences</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-20 bg-gray-900/50">
                        <div className="container mx-auto px-4">
                            <div className="text-center mb-16">
                                <h2 className="text-4xl md:text-5xl font-bold mb-6 bg-gradient-to-r from-yellow-400 to-orange-400 bg-clip-text text-transparent">
                                    {t('contact.title')}
                                </h2>
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-8 max-w-4xl mx-auto">
                                <div className="text-center p-6 bg-gray-800/50 rounded-xl backdrop-blur-sm border border-gray-700">
                                    <h3 className="text-xl font-bold text-yellow-400 mb-2">{t('contact.phone')}</h3>
                                    <p className="text-gray-300">+1 (555) 123-4567</p>
                                </div>
                                <div className="text-center p-6 bg-gray-800/50 rounded-xl backdrop-blur-sm border border-gray-700">
                                    <h3 className="text-xl font-bold text-yellow-400 mb-2">{t('contact.email')}</h3>
                                    <p className="text-gray-300">info@printingworld.com</p>
                                </div>
                                <div className="text-center p-6 bg-gray-800/50 rounded-xl backdrop-blur-sm border border-gray-700">
                                    <h3 className="text-xl font-bold text-yellow-400 mb-2">{t('contact.address')}</h3>
                                    <p className="text-gray-300">123 Design St, Print City</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-black py-8 border-t border-gray-800">
                        <div className="container mx-auto px-4 text-center">
                            <div className="flex items-center justify-center space-x-2 mb-4">
                                <h3 
                                    className="fixed-logo text-xl font-bold"
                                    data-no-translate="true"
                                >
                                    Printing World
                                </h3>
                                <span className="fixed-badge">✓ FIXED</span>
                            </div>
                            <p className="text-gray-400">© 2024 Printing World. All rights reserved.</p>
                            <p className="text-sm text-gray-500 mt-2">Admin Password: printingworld2024</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
